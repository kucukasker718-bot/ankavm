---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - oxdisk
      - users
      - summary
  - exec:
      - ankavm_install
  - show:
      - finished

branding: ankavm

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true






