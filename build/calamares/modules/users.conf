---
# ankavm: tek kullanÄ±cÄ± (web arayÃ¼zÃ¼ admin)
defaultGroups:
    - name: adm
      must_exist: false
      system: true
    - name: sudo
      must_exist: false
      system: true

autologinGroup:  autologin
doAutologin:     false
setRootPassword: true
doReusePassword: false

passwordRequirements:
    minLength:   8
    maxLength:   -1
    libpwquality:
        - minlen=8

avatarFilePath:   "~/.face"
allowWeakPasswords: false

userShell: /bin/bash

hostname:
    location: EtcFile
    writeHostsFile: true
    template: "ankavm-node"






