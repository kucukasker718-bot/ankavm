# ANKAVM Hypervisor â€” systemd Security Hardening Drop-in
# Install: sudo mkdir -p /etc/systemd/system/ankavm.service.d/
#          sudo cp kernel/systemd/ankavm-hardening.conf /etc/systemd/system/ankavm.service.d/
#          sudo systemctl daemon-reload && sudo systemctl restart ankavm
#
# Compatible with Ubuntu 22.04 / Debian 12 + KVM/QEMU/libvirt stack.
# ProtectSystem=strict removed â€” libvirt/qemu need broad filesystem access.
# PrivateTmp=true supported but disabled for libvirt socket compat.

[Service]

# â”€â”€ Runtime directory (systemd creates /run/ankavm before start) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
RuntimeDirectory=ankavm
RuntimeDirectoryMode=0750

# â”€â”€ Capabilities: drop everything except what KVM/libvirt needs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_RAW CAP_SYS_PTRACE CAP_DAC_OVERRIDE CAP_DAC_READ_SEARCH CAP_SYS_ADMIN CAP_KILL CAP_FOWNER CAP_FSETID CAP_SETUID CAP_SETGID CAP_NET_BIND_SERVICE CAP_IPC_LOCK CAP_SYS_RESOURCE
AmbientCapabilities=CAP_NET_ADMIN CAP_NET_RAW CAP_SYS_PTRACE CAP_DAC_OVERRIDE CAP_SYS_ADMIN

# â”€â”€ No new privileges (prevent setuid escalation) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
NoNewPrivileges=false

# â”€â”€ Filesystem protection â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# ProtectSystem=yes: only /usr and /boot are read-only.
# NOT full/strict because:
#   - full  â†’ /etc read-only: breaks ExecStartPre chown/chmod /etc/ankavm
#   - strict â†’ everything r/o: breaks libvirt/qemu completely
ProtectSystem=yes

# PrivateTmp: isolated /tmp â€” prevents /tmp race attacks
# Safe for ankavm; libvirt uses /run/libvirt not /tmp
PrivateTmp=true

# ProtectHome: block /home and /root (ankavm doesn't need user homes)
ProtectHome=read-only

# â”€â”€ Device access â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
DevicePolicy=closed
DeviceAllow=/dev/kvm rw
DeviceAllow=/dev/net/tun rw
DeviceAllow=/dev/vhost-net rw
DeviceAllow=/dev/urandom r
DeviceAllow=/dev/random r
DeviceAllow=/dev/null rw
DeviceAllow=/dev/zero rw
DeviceAllow=/dev/ptmx rw
DeviceAllow=char-tty rw
DeviceAllow=char-pts rw

# â”€â”€ Kernel protection â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Block kernel module loading from ankavm process
ProtectKernelModules=true

# Allow kernel log reading (needed for diagnostics)
ProtectKernelLogs=false

# Allow /proc/sys writes (nftables, sysctl for networking)
ProtectKernelTunables=false

# Allow cgroup writes (VMs managed via cgroups)
ProtectControlGroups=false

# â”€â”€ Clock, personality, realtime â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
ProtectClock=true
LockPersonality=true
RestrictRealtime=true
RestrictSUIDSGID=true

# â”€â”€ Memory hardening â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Python JIT requires W+X mappings â€” keep false
MemoryDenyWriteExecute=false

# â”€â”€ Address families â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX AF_NETLINK AF_PACKET AF_VSOCK

# â”€â”€ Syscall filtering â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Use broad groups â€” KVM/libvirt need many syscalls
SystemCallFilter=@system-service @network-io @file-system @process @io-event @ipc @basic-io @signal
SystemCallFilter=~@obsolete @swap

# Allow specific syscalls needed by KVM/Python/libvirt
SystemCallFilter=ptrace perf_event_open bpf userfaultfd io_uring_setup io_uring_enter

SystemCallArchitectures=native
SystemCallErrorNumber=EPERM

# â”€â”€ Resource limits â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
LimitNPROC=8192
LimitNOFILE=65536
LimitCORE=0

# â”€â”€ cgroups v2 resource control â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Allow up to 8 CPU cores worth of CPU (800% = 8 cores)
CPUQuota=800%
# Reserve memory for VMs â€” ankavm daemon itself limited to 4GB
MemoryMax=4G
MemorySwapMax=0
IOWeight=50

# â”€â”€ Misc â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
UMask=0027
RemoveIPC=true






