<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankavm – VNC Konsol</title>
  <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1515045766870204546/1517299816584187974/A6BC5533-45B8-4EFC-A059-6BEEB5EFD501.png?ex=6a371892&is=6a35c712&hm=6afedb435545b73510418a3a2d8e5ffd7933ab1632c85d9436a7f76009e48114&">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0d1117;
      color:#e6edf3;
      font-family:'Segoe UI',system-ui,sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .header {
      background:#161b22;
      border-bottom:1px solid #30363d;
      padding:8px 16px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
      height:44px;
    }
    /* standalone only — no embed styles needed (server-side conditional) */
    .logo {
      display:flex;
      align-items:center;
      gap:7px;
      font-size:13px;
      font-weight:700;
      color:#00d4ff;
    }
    .logo img { width:26px; height:26px; object-fit:contain; filter:drop-shadow(0 0 6px rgba(0,212,255,.5)); }
    .vm-label { font-size:12px; color:#8b949e; }
    .vm-label span { color:#e6edf3; font-weight:600; }
    .spacer { flex:1; }
    .status {
      font-size:11px;
      padding:3px 9px;
      border-radius:10px;
      background:rgba(0,0,0,.4);
      border:1px solid #30363d;
      color:#8b949e;
    }
    .status.ok { color:#3fb950; border-color:rgba(63,185,80,.4); }
    .status.err { color:#f85149; border-color:rgba(248,81,73,.4); }
    .btn {
      padding:4px 10px;
      border-radius:5px;
      border:1px solid #30363d;
      background:#21262d;
      color:#e6edf3;
      font-size:12px;
      cursor:pointer;
      transition:background .12s;
      white-space:nowrap;
    }
    .btn:hover { background:#30363d; }
    .btn.danger { border-color:rgba(248,81,73,.4); color:#f85149; }
    .btn.danger:hover { background:rgba(248,81,73,.1); }
    #screen {
      flex:1;
      background:#000;
      position:relative;
      overflow:hidden;
    }
    #screen canvas { display:block; }
    #loading {
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      background:#000;
      z-index:10;
    }
    .spin {
      width:40px;height:40px;
      border:3px solid rgba(0,212,255,.2);
      border-top-color:#00d4ff;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    #load-msg { color:#8b949e; font-size:13px; }
    #load-detail{ color:#484f58; font-size:11px; max-width:340px; text-align:center; word-break:break-all; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

{% if not embed %}
<div class="header">
  <div class="logo">
    <img src="https://cdn.discordapp.com/attachments/1515045766870204546/1517299816584187974/A6BC5533-45B8-4EFC-A059-6BEEB5EFD501.png?ex=6a371892&is=6a35c712&hm=6afedb435545b73510418a3a2d8e5ffd7933ab1632c85d9436a7f76009e48114&" alt="" onerror="this.style.display='none'">
    Ankavm
  </div>
  <div class="vm-label">VNC Konsol › <span id="vm-name">Yükleniyor…</span></div>
  <div class="spacer"></div>
  <span id="status" class="status">Bağlanıyor…</span>
  <button id="lock-btn" class="btn" onclick="togglePointerLock()" title="Mouse'u konsola kilitle (veya konsola tıkla)">Mouse Kilitle</button>
  <button class="btn" onclick="vncPaste()" title="Panodan yapıştır (Ctrl+Shift+V)">Yapıştır</button>
  <button class="btn" onclick="sendCtrlAltDel()">Ctrl+Alt+Del</button>
  <button class="btn" onclick="toggleFS()">Tam Ekran</button>
  <button class="btn danger" onclick="window.close()">Kapat</button>
</div>
{% endif %}

<div id="screen">
  <div id="loading">
    <div class="spin"></div>
    <p id="load-msg">Konsol başlatılıyor…</p>
    <small id="load-detail"></small>
  </div>
</div>

<script>
const _vmId = {{ vm_id | tojson }}; /* OXW-2026-SEC-006: tojson = XSS-safe JS literal */
/* OXW-2026-SEC-008: tek-kullanımlık vnc_token tercih edilir, yoksa JWT'ye düşer */
const _qs = new URLSearchParams(location.search);
const _vncToken = _qs.get("vnc_token") || "";
const _token = _vncToken
             || _qs.get("token")
             || localStorage.getItem("ankavm_token")
             || localStorage.getItem("adaos_token");
const _wsParam = _vncToken ? "vnc_token" : "token";

if (!_token) {
  document.getElementById("load-msg").textContent = "Oturum token bulunamadı.";
  throw new Error("no token");
}

let _rfb = null;

function setStatus(msg, ok) {
  const el = document.getElementById("status");
  if (!el) return; // embed mode — header not rendered
  el.textContent = msg;
  el.className = "status " + (ok === true ? "ok" : ok === false ? "err" : "");
}
function setLoad(msg, detail) {
  const lm = document.getElementById("load-msg");
  const ld = document.getElementById("load-detail");
  if (lm) lm.textContent = msg || "";
  if (ld) ld.textContent = detail || "";
}
function hideLoading() {
  const el = document.getElementById("loading");
  if (el) el.style.display = "none";
}

// Fetch VM name for title bar
(async () => {
  try {
    const r = await fetch(`/api/vms/${_vmId}`, { headers: { Authorization: "Bearer " + _token } });
    if (r.ok) {
      const d = await r.json();
      const name = (d.vm || d).name || _vmId;
      const nm = document.getElementById("vm-name");
      if (nm) nm.textContent = name;
      document.title = "VNC – " + name;
    }
  } catch (_) {}
})();

// ── Canvas createElement intercept — noVNC handler capture (pointer lock) ─────
// noVNC registers mouse handlers on canvas via addEventListener.
// We capture them here (before noVNC loads) so pointer lock can call them directly,
// bypassing isTrusted check on synthetic events.
(function() {
  const _orig = document.createElement.bind(document);
  const _map = new WeakMap();
  document.createElement = function(tag, ...args) {
    const el = _orig(tag, ...args);
    if (tag.toLowerCase() === "canvas") {
      const h = { mousemove: [], mousedown: [], mouseup: [], wheel: [] };
      const _origAEL = el.addEventListener.bind(el);
      el.addEventListener = function(type, fn, opts) {
        if (h[type]) h[type].push(fn);
        return _origAEL(type, fn, opts);
      };
      _map.set(el, h);
    }
    return el;
  };
  window._vncHandlers = (canvas) => _map.get(canvas) || {};
})();

// ── WebSocket debug interceptor — logs all WS events to console ──────────────
(function() {
  const _OrigWS = window.WebSocket;
  window.WebSocket = function(url, protocols) {
    const ws = new _OrigWS(url, protocols);
    console.log('[WS] created url=' + url + ' protocols=' + JSON.stringify(protocols));
    ws.addEventListener('open', () => console.log('[WS] open protocol=' + ws.protocol + ' binaryType=' + ws.binaryType));
    ws.addEventListener('close', (e) => console.log('[WS] close code=' + e.code + ' reason=' + e.reason + ' clean=' + e.wasClean));
    ws.addEventListener('error', () => console.error('[WS] error'));
    ws.addEventListener('message', (e) => {
      const info = e.data instanceof ArrayBuffer
        ? e.data.byteLength + 'B binary first=' + Array.from(new Uint8Array(e.data).slice(0,6)).map(b=>b.toString(16).padStart(2,'0')).join(' ')
        : '"' + String(e.data).slice(0,32) + '"';
      console.log('[WS] message ' + info);
    });
    const _origSend = ws.send.bind(ws);
    ws.send = function(data) {
      const info = data instanceof ArrayBuffer || ArrayBuffer.isView(data)
        ? (data.byteLength ?? data.buffer.byteLength) + 'B binary'
        : '"' + String(data).slice(0, 32) + '"';
      console.log('[WS] send ' + info);
      return _origSend(data);
    };
    // NOTE: binaryType must NOT be overridden — noVNC sets it to 'arraybuffer'
    // and any broken setter causes RFB parsing failure (gets Blob instead of ArrayBuffer).
    return ws;
  };
  window.WebSocket.prototype = _OrigWS.prototype;
  Object.assign(window.WebSocket, _OrigWS);
})();

// Main: connect noVNC via Flask WS proxy on same port (8006) — same cert, no TLS issues
(async () => {
  try {
    setLoad("noVNC yükleniyor…");
    const rfbMod = await import("/novnc/core/rfb.js");
    const RFB = rfbMod.default;

    // Same port as Flask → same cert already accepted by browser → no TLS issue
    const wsProto = (location.protocol === "https:") ? "wss" : "ws";
    const wsUrl = `${wsProto}://${location.host}/ws/vnc/${_vmId}?${_wsParam}=${encodeURIComponent(_token)}`; /* OXW-2026-SEC-008 */

    setLoad("VNC bağlanıyor…", wsUrl);
    setStatus("Bağlanıyor…");

    const screen = document.getElementById("screen");
    _rfb = new RFB(screen, wsUrl, { credentials: { password: "" } });

    _rfb.viewOnly = false;
    _rfb.scaleViewport = true;
    _rfb.resizeSession = false;
    _rfb.background = "#000000";

    // postMessage → parent modal can update its own status badge
    // NOTE: spread extra only when defined — spreading undefined throws TypeError (caught silently)
    function _pmStatus(text, ok, extra) {
      try { window.parent.postMessage(Object.assign({ type: 'vncStatus', text, ok }, extra || {}), location.origin); } catch(_) {} /* OXW-2026-SEC-007 */
    }

    _rfb.addEventListener("connect", () => {
      hideLoading();
      setStatus("● Bağlı", true);
      _pmStatus("● Bağlı", true);
    });

    _rfb.addEventListener("disconnect", (e) => {
      const reason = e.detail?.reason || "";
      const msg = "Bağlantı kesildi" + (reason ? ": " + reason : "");
      setStatus(msg, false);
      setLoad("Bağlantı kesildi", reason);
      const ld = document.getElementById("loading");
      if (ld) ld.style.display = "flex";
      _pmStatus(msg, false);
    });

    _rfb.addEventListener("credentialsrequired", () => {
      _rfb.sendCredentials({ password: "" });
    });

    _rfb.addEventListener("desktopname", (e) => {
      if (e.detail?.name) {
        const nm = document.getElementById("vm-name");
        if (nm) nm.textContent = e.detail.name;
        document.title = "VNC – " + e.detail.name;
        setStatus("● " + e.detail.name, true);
        _pmStatus("● " + e.detail.name, true, { vmName: e.detail.name });
      }
    });

  } catch (e) {
    setStatus("Hata", false);
    setLoad("Bağlantı kurulamadı", e.message);
    console.error("VNC init error:", e);
  }
})();

function sendCtrlAltDel() {
  if (_rfb) _rfb.sendCtrlAltDel();
}

function toggleFS() {
  const el = document.getElementById("screen");
  if (!document.fullscreenElement) el.requestFullscreen().catch(() => {});
  else document.exitFullscreen();
}

// ── Pointer Lock ──────────────────────────────────────────────────────────────
let _vX = 0, _vY = 0;
let _plCanvas = null;

function _updateLockBtn() {
  const btn = document.getElementById("lock-btn");
  const locked = !!document.pointerLockElement;
  if (!btn) return;
  btn.textContent = locked ? "Ctrl+Alt = Serbest" : "Mouse Kilitle";
  btn.style.color = locked ? "#3fb950" : "";
  btn.style.borderColor = locked ? "rgba(63,185,80,.5)" : "";
}

function togglePointerLock() {
  if (document.pointerLockElement) document.exitPointerLock();
  else if (_plCanvas) _plCanvas.requestPointerLock();
}

function setupPointerLock(canvas) {
  _plCanvas = canvas;
  const h = window._vncHandlers(canvas); // noVNC'nin yakalanan handler'ları

  // noVNC handler'larını Proxy ile doğrudan çağır (isTrusted sorunu yok)
  function _call(type, e, extra) {
    const list = h[type] || [];
    if (!list.length) return;
    const proxy = new Proxy(e, {
      get(t, p) {
        if (p in extra) return extra[p];
        const v = t[p];
        return typeof v === "function" ? v.bind(t) : v;
      }
    });
    for (const fn of list) { try { fn(proxy); } catch(_) {} }
  }

  // Canvas'a tıklayınca kilitle
  canvas.addEventListener("click", () => {
    if (!document.pointerLockElement) canvas.requestPointerLock();
  });

  // Pointer lock aktif → relative movementX/Y → sanal mutlak konum → noVNC handler
  document.addEventListener("mousemove", (e) => {
    if (!e.isTrusted || document.pointerLockElement !== canvas) return;
    const r = canvas.getBoundingClientRect();
    _vX = Math.max(0, Math.min(r.width, _vX + e.movementX));
    _vY = Math.max(0, Math.min(r.height, _vY + e.movementY));
    _call("mousemove", e, { clientX: r.left + _vX, clientY: r.top + _vY,
                             movementX: 0, movementY: 0, isTrusted: true,
                             target: canvas, currentTarget: canvas });
  }, true);

  document.addEventListener("mousedown", (e) => {
    if (!e.isTrusted || document.pointerLockElement !== canvas) return;
    const r = canvas.getBoundingClientRect();
    _call("mousedown", e, { clientX: r.left + _vX, clientY: r.top + _vY,
                             isTrusted: true, target: canvas, currentTarget: canvas });
  }, true);

  document.addEventListener("mouseup", (e) => {
    if (!e.isTrusted || document.pointerLockElement !== canvas) return;
    const r = canvas.getBoundingClientRect();
    _call("mouseup", e, { clientX: r.left + _vX, clientY: r.top + _vY,
                           isTrusted: true, target: canvas, currentTarget: canvas });
  }, true);

  // Ctrl+Alt → unlock; Ctrl+Alt+Del geçer
  document.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.altKey && document.pointerLockElement === canvas) {
      if (e.key !== "Delete") {
        document.exitPointerLock();
        e.preventDefault();
        e.stopPropagation();
      }
    }
  }, true);

  // Kilit durumu değişince gösterge güncelle + parent modal'a bildir
  document.addEventListener("pointerlockchange", () => {
    _updateLockBtn();
    const locked = document.pointerLockElement === canvas;
    if (locked) {
      const r = canvas.getBoundingClientRect();
      _vX = r.width / 2;
      _vY = r.height / 2;
    }
    // Notify parent modal to update its lock button
    try { window.parent.postMessage({ type: 'vncLockChange', locked }, location.origin); } catch(_) {} /* OXW-2026-SEC-007 */
  });
}

// noVNC canvas'ı async oluşturuyor — polling ile bekle
const _lockPoller = setInterval(() => {
  const canvas = document.querySelector("#screen canvas");
  if (canvas) { clearInterval(_lockPoller); setupPointerLock(canvas); }
}, 150);

// ── Paste support — sendKey() per char, avoids ClientCutText RFB disconnect ──
// clipboardPasteFrom() sends ClientCutText which crashes QEMU VNC → disconnects.
// Instead: open textarea modal, user pastes freely, then send char-by-char via sendKey().
function vncPaste() {
  const existing = document.getElementById("vnc-paste-modal");
  if (existing) { existing.remove(); return; }

  const overlay = document.createElement("div");
  overlay.id = "vnc-paste-modal";
  overlay.style.cssText = "position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center";

  const box = document.createElement("div");
  box.style.cssText = "background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px 22px;width:400px;max-width:92vw;box-shadow:0 12px 40px rgba(0,0,0,.7)";

  const ttl = document.createElement("div");
  ttl.textContent = "VM'ye Yapıştır";
  ttl.style.cssText = "font-size:14px;font-weight:700;color:#e6edf3;margin-bottom:5px";

  const hint = document.createElement("div");
  hint.textContent = "Ctrl+V ile yapıştırın → Gönder. İzin gerekmez, VNC bağlantısı kesilmez.";
  hint.style.cssText = "font-size:11px;color:#8b949e;margin-bottom:10px";

  const ta = document.createElement("textarea");
  ta.placeholder = "Metni buraya yapıştırın…";
  ta.style.cssText = "width:100%;height:85px;box-sizing:border-box;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 11px;color:#e6edf3;font-size:13px;font-family:monospace;resize:vertical;outline:none";
  ta.addEventListener("focus", () => { ta.style.borderColor = "#1e88e5"; });
  ta.addEventListener("blur", () => { ta.style.borderColor = "#30363d"; });

  const row = document.createElement("div");
  row.style.cssText = "display:flex;gap:8px;justify-content:flex-end;margin-top:10px";

  const cBtn = document.createElement("button");
  cBtn.textContent = "İptal";
  cBtn.style.cssText = "padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:transparent;color:#e6edf3;cursor:pointer;font-size:12px";
  cBtn.onclick = () => overlay.remove();

  const sBtn = document.createElement("button");
  sBtn.textContent = "Gönder →";
  sBtn.style.cssText = "padding:6px 16px;border-radius:6px;border:none;background:#1565c0;color:#fff;cursor:pointer;font-size:12px;font-weight:600";
  sBtn.onclick = () => {
    const text = ta.value;
    overlay.remove();
    if (text && _rfb && typeof _rfb.sendKey === "function") {
      _sendKeysToRfb(_rfb, text);
    }
  };

  ta.addEventListener("keydown", e => { if (e.ctrlKey && e.key === "Enter") sBtn.click(); });

  row.append(cBtn, sBtn);
  box.append(ttl, hint, ta, row);
  overlay.append(box);
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  setTimeout(() => ta.focus(), 30);
}

function _sendKeysToRfb(rfb, text) {
  // Send characters via X11 keysyms — does NOT trigger VNC disconnect
  let i = 0;
  function next() {
    if (i >= text.length) return;
    const ch = text[i++];
    let ks;
    if (ch === "\n" || ch === "\r") { ks = 0xff0d; }
    else if (ch === "\t") { ks = 0xff09; }
    else {
      const c = ch.charCodeAt(0);
      ks = (c >= 0x20 && c <= 0x7e) ? c : (0x1000000 | c);
    }
    rfb.sendKey(ks, "", true);
    rfb.sendKey(ks, "", false);
    setTimeout(next, 30);
  }
  next();
}

// Ctrl+Shift+V → paste modal
document.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.shiftKey && (e.key === "V" || e.code === "KeyV")) {
    e.preventDefault();
    vncPaste();
  }
});

// postMessage bridge — parent (in-page modal) can call functions via messages
window.addEventListener("message", (e) => {
  if (e.origin !== location.origin) return; /* OXW-2026-SEC-007: origin doğrula */
  if (!e.data || typeof e.data !== "object") return;
  switch (e.data.type) {
    case "vncCtrlAltDel": sendCtrlAltDel(); break;
    case "vncPaste": vncPaste(); break;
    case "vncPointerLock": togglePointerLock(); break;
  }
});
</script>
</body>
</html>
