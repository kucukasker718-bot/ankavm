<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankavm Hypervisor â€“ GiriÅŸ</title>
  <link rel="icon" type="image/png" href="/static/img/sadeceikon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* â”€â”€ Background â”€â”€ */
    .bg-wrap {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0d2340 0%, #0f3460 35%, #1a5276 65%, #1f618d 100%);
      z-index: 0;
    }

    /* Geometric diamond shapes like ESXi */
    .geo {
      position: absolute;
      opacity: 0.12;
    }
    .geo-1 {
      width: 420px; height: 420px;
      background: #5dade2;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      top: -80px; right: 20%;
    }
    .geo-2 {
      width: 280px; height: 280px;
      background: #85c1e9;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      top: 180px; right: 28%;
      opacity: 0.08;
    }
    .geo-3 {
      width: 520px; height: 520px;
      background: #2e86c1;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      bottom: -160px; right: 8%;
      opacity: 0.15;
    }
    .geo-4 {
      width: 200px; height: 200px;
      background: #aed6f1;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      top: 55%; right: 42%;
      opacity: 0.06;
    }
    .geo-5 {
      width: 160px; height: 160px;
      background: #5dade2;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      bottom: 12%; left: 52%;
      opacity: 0.09;
    }

    /* â”€â”€ Layout: left form | right brand â”€â”€ */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Left: form panel */
    .left-panel {
      width: 400px;
      min-width: 360px;
      background: rgba(8, 20, 35, 0.72);
      backdrop-filter: blur(2px);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      padding: 0 52px;
      justify-content: center;
    }

    .brand-top {
      position: absolute;
      top: 28px;
      left: 32px;
    }

    .brand-top img {
      height: 28px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .form-title {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: #d0dce8;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      background: #ffffff;
      border: 1px solid #b0bec5;
      border-radius: 0;
      color: #1a2535;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #1e88e5;
      box-shadow: 0 0 0 2px rgba(30,136,229,0.25);
    }

    input::placeholder { color: #90a4ae; }

    .btn-login {
      width: 100%;
      padding: 9px 14px;
      background: #1565c0;
      border: none;
      border-radius: 0;
      color: white;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    .btn-login:hover { background: #1976d2; }
    .btn-login:active { background: #0d47a1; }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: rgba(211, 47, 47, 0.15);
      border-left: 3px solid #e53935;
      color: #ef9a9a;
      padding: 8px 12px;
      font-size: 12px;
      margin-top: 12px;
    }

    /* Right: brand panel */
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .brand-center {
      text-align: left;
    }

    .brand-logo {
      height: 52px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      margin-bottom: 18px;
      display: block;
    }

    .brand-logo-fallback {
      display: none;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-logo-fallback svg {
      width: 52px;
      height: 52px;
      fill: white;
      opacity: 0.9;
    }

    .brand-logo-fallback-text {
      font-size: 42px;
      font-weight: 300;
      color: white;
      letter-spacing: -1px;
    }

    .brand-product {
      font-size: 32px;
      font-weight: 300;
      color: white;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .brand-product strong {
      font-weight: 700;
    }

    .brand-product sup {
      font-size: 14px;
      font-weight: 400;
      vertical-align: super;
      margin-left: 2px;
    }

    .brand-edition {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* 2FA panel */
    .twofa-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .twofa-header .twofa-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .twofa-header p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    .twofa-title {
      font-size: 15px;
      font-weight: 600;
      color: #d0dce8;
    }

    input.totp-input {
      text-align: center;
      font-size: 24px;
      letter-spacing: 10px;
      font-family: 'Courier New', monospace;
      background: #ffffff;
      color: #1a2535;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      cursor: pointer;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }

    /* Version footer */
    .ver-footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 400px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 680px) {
      .right-panel { display: none; }
      .left-panel { width: 100%; padding: 40px 32px; }
      .ver-footer { width: 100%; }
    }

    /* â”€â”€ Login Splash (shown after successful login) â”€â”€ */
    #login-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0d2340 0%, #0f3460 35%, #1a5276 65%, #1f618d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #login-splash.splash-in { opacity: 1; pointer-events: all; }
    #login-splash.splash-out { opacity: 0; }

    /* same geo shapes as background */
    #login-splash .s-geo {
      position: absolute;
      pointer-events: none;
    }
    #login-splash .s-geo-1 {
      width: 420px; height: 420px;
      background: #5dade2;
      clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      top: -80px; right: 20%;
      opacity: 0.12;
    }
    #login-splash .s-geo-2 {
      width: 520px; height: 520px;
      background: #2e86c1;
      clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      bottom: -160px; right: 8%;
      opacity: 0.15;
    }
    #login-splash .s-geo-3 {
      width: 280px; height: 280px;
      background: #85c1e9;
      clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
      top: 60%; left: 5%;
      opacity: 0.08;
    }

    .splash-logo-wrap {
      position: relative;
      overflow: hidden;
      line-height: 0;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
    }
    #login-splash.splash-in .splash-logo-wrap {
      opacity: 1;
      transform: translateY(0);
    }
    .splash-logo-img {
      height: 64px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      display: block;
    }
    /* Grey shimmer sweeps over the white logo */
    .splash-logo-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 55%;
      height: 100%;
      background: linear-gradient(
        105deg,
        transparent 0%,
        rgba(180,200,220,0.18) 40%,
        rgba(200,220,235,0.35) 50%,
        rgba(180,200,220,0.18) 60%,
        transparent 100%
      );
      transform: skewX(-15deg);
      animation: none;
    }
    #login-splash.splash-in .splash-logo-wrap::after {
      animation: splashShimmer 1.1s ease-in-out 0.55s forwards;
    }
    @keyframes splashShimmer {
      from { left: -80%; }
      to { left: 160%; }
    }

    .splash-tagline {
      margin-top: 18px;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.32);
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(16px);
      transition: opacity 0.65s ease 0.55s, transform 0.65s ease 0.55s;
    }
    #login-splash.splash-in .splash-tagline {
      opacity: 1;
      transform: translateX(0);
    }

    .splash-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent);
      animation: none;
      width: 0;
    }
    #login-splash.splash-in .splash-bar {
      animation: splashProgress 2s ease-in-out 0.2s forwards;
    }
    @keyframes splashProgress {
      from { width: 0; left: 0; }
      to { width: 100%; left: 0; }
    }
  </style>
</head>
<body>

  <!-- â”€â”€ Login Splash (hidden until login success) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ -->
  <div id="login-splash">
    <div class="s-geo s-geo-1"></div>
    <div class="s-geo s-geo-2"></div>
    <div class="s-geo s-geo-3"></div>
    <div class="splash-bar"></div>
    <div class="splash-logo-wrap">
      <img class="splash-logo-img" src="https://cdn.discordapp.com/attachments/1515045766870204546/1517299816584187974/A6BC5533-45B8-4EFC-A059-6BEEB5EFD501.png?ex=6a366fd2&is=6a351e52&hm=3637a9d7e8c532276df3e65e8203306d492a152236b77d8d3bfc0fd9c18458c2&" alt="Ankavm"
           onerror="this.style.display='none'">
    </div>
    <div class="splash-tagline">Hypervisor Management System</div>
  </div>

  <div class="bg-wrap">
    <div class="geo geo-1"></div>
    <div class="geo geo-2"></div>
    <div class="geo geo-3"></div>
    <div class="geo geo-4"></div>
    <div class="geo geo-5"></div>
  </div>

  <div class="page">
    <!-- Brand top-left -->
    <div class="brand-top">
      <img src="https://cdn.discordapp.com/attachments/1515045766870204546/1517299816584187974/A6BC5533-45B8-4EFC-A059-6BEEB5EFD501.png?ex=6a366fd2&is=6a351e52&hm=3637a9d7e8c532276df3e65e8203306d492a152236b77d8d3bfc0fd9c18458c2&" alt="Ankavm"
           onerror="this.style.display='none'">
    </div>

    <!-- Left: login form -->
    <div class="left-panel">
      <div class="form-title">Ankavm Hypervisor Management</div>

      <!-- Login form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="username">User name</label>
          <input type="text" id="username" name="username"
                 placeholder="" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Log in</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <!-- 2FA panel -->
      <div id="twofa-panel" style="display:none">
        <div class="twofa-header">
          <div class="twofa-icon"></div>
          <div class="twofa-title">Two-Factor Authentication</div>
          <p>Enter the 6-digit code from your authenticator app</p>
        </div>
        <div class="form-group">
          <label for="totp-code">Verification Code</label>
          <input type="text" id="totp-code" class="totp-input"
                 maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                 autocomplete="one-time-code"
                 oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
        <button onclick="doVerify2fa()" class="btn-login" id="verifyBtn">Verify</button>
        <div class="error-msg" id="twofa-errorMsg"></div>
        <a class="back-link" onclick="cancelTwofa()">â† Back</a>
      </div>
    </div>

    <!-- Right: brand -->
    <div class="right-panel">
      <div class="brand-center">
        <img class="brand-logo" src="https://cdn.discordapp.com/attachments/1515045766870204546/1517299816584187974/A6BC5533-45B8-4EFC-A059-6BEEB5EFD501.png?ex=6a366fd2&is=6a351e52&hm=3637a9d7e8c532276df3e65e8203306d492a152236b77d8d3bfc0fd9c18458c2&" alt="Ankavm"
             onerror="this.style.display='none'; document.querySelector('.brand-logo-fallback').style.display='flex';">
        <div class="brand-logo-fallback">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7l-8 4-8-4v-7l8-4.32zM12 7a5 5 0 100 10A5 5 0 0012 7zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
          </svg>
          <div class="brand-logo-fallback-text">Ankavm</div>
        </div>
        <div class="brand-product">
          <strong>Ankavm</strong><sup>Â®</sup> Hypervisor<sup>â„¢</sup>
        </div>
        <div class="brand-edition">KVM / QEMU Â· v2.8.0</div>
      </div>
    </div>

    <div class="ver-footer">Ankavm Hypervisor v2.8.0</div>
  </div>

  <script>
    let _tempToken = null;

    // â”€â”€ Login Splash â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function showSplash(dest) {
      dest = dest || "/";
      const s = document.getElementById("login-splash");
      // Make visible first (opacity:0 â†’ starts transition)
      s.style.display = "flex";
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { s.classList.add("splash-in"); });
      });
      // After animation (~2.2s), fade out then redirect
      setTimeout(() => {
        s.classList.remove("splash-in");
        s.classList.add("splash-out");
        setTimeout(() => { window.location.href = dest; }, 380);
      }, 2200);
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const errEl = document.getElementById("errorMsg");
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      errEl.style.display = "none";

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });
        const data = await res.json();

        if (res.ok && data.requires_2fa) {
          _tempToken = data.temp_token;
          document.getElementById("loginForm").style.display = "none";
          document.getElementById("twofa-panel").style.display = "block";
          setTimeout(() => document.getElementById("totp-code").focus(), 100);
        } else if (res.ok && data.token) {
          localStorage.setItem("ankavm_token", data.token);
          localStorage.setItem("ankavm_user", data.username);
          localStorage.setItem("ankavm_role", data.role || "administrator");
          showSplash("/");
        } else {
          errEl.textContent = data.error || "Login failed.";
          errEl.style.display = "block";
        }
      } catch {
        errEl.textContent = "Cannot connect to server.";
        errEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Log in";
      }
    });

    async function doVerify2fa() {
      const code = document.getElementById("totp-code").value.trim();
      const btn = document.getElementById("verifyBtn");
      const errEl = document.getElementById("twofa-errorMsg");
      if (code.length !== 6) { errEl.textContent = "Enter 6-digit code."; errEl.style.display = "block"; return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verifying...';
      errEl.style.display = "none";
      try {
        const res = await fetch("/api/auth/2fa/verify-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ temp_token: _tempToken, code }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem("ankavm_token", data.token);
          localStorage.setItem("ankavm_user", data.username);
          localStorage.setItem("ankavm_role", data.role || "administrator");
          showSplash("/");
        } else {
          errEl.textContent = data.error || "Invalid code.";
          errEl.style.display = "block";
          document.getElementById("totp-code").value = "";
          document.getElementById("totp-code").focus();
        }
      } catch {
        errEl.textContent = "Cannot connect to server.";
        errEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Verify";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && document.getElementById("twofa-panel").style.display !== "none") {
        doVerify2fa();
      }
    });

    function cancelTwofa() {
      _tempToken = null;
      document.getElementById("twofa-panel").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("totp-code").value = "";
      document.getElementById("twofa-errorMsg").style.display = "none";
    }

    if (localStorage.getItem("ankavm_token") || localStorage.getItem("adaos_token")) {
      window.location.href = "/";
    }
  </script>
</body>
</html>
