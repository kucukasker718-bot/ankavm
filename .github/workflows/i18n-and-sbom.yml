name: i18n parity + SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  i18n-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh i18n pipeline
        run: |
          mkdir -p tmp_i18n
          python scripts/i18n_extract.py
          python scripts/i18n_html_scan.py || true
          python scripts/i18n_js_scan.py || true

      - name: Fail if untranslated TR strings detected
        run: |
          if [ -s tmp_i18n/missing_html_tr.txt ]; then
            echo "::error::Untranslated TR strings in HTML body:"
            cat tmp_i18n/missing_html_tr.txt
            exit 1
          fi
          if [ -s tmp_i18n/missing_js_tr.txt ]; then
            echo "::error::Untranslated TR strings in JS literals:"
            cat tmp_i18n/missing_js_tr.txt
            exit 1
          fi

      - name: Upload i18n diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-diagnostics
          path: tmp_i18n/

  sbom:
    runs-on: ubuntu-latest
    needs: i18n-parity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps (best-effort)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Generate CycloneDX SBOM
        run: |
          python -c "from ankavm.backend import sbom_generator; \
import json, pathlib; \
pathlib.Path('sbom-cyclonedx.json').write_text( \
  json.dumps(sbom_generator.generate('sbom-cyclonedx.json'), indent=2))"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json






