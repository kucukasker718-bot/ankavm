name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-app
        run: npm install

      - name: Build & publish ${{ matrix.platform }}
        working-directory: electron-app
        run: npm run dist:${{ matrix.platform }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing â€” unsigned build, OS will show a warning on first run
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          WIN_CSC_LINK: ""






